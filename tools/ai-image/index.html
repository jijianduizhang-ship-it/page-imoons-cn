<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 图片生成器 - 免费在线工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:#0a0a0a;color:#e2e8f0;min-height:100vh;overflow-x:hidden}
:root{--accent:#a855f7;--accent2:#06b6d4;--surface:#141418;--border:#27272a}
.container{max-width:720px;margin:0 auto;padding:32px 20px}
.header{text-align:center;margin-bottom:32px}
.header h1{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#a855f7,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.header p{color:#71717a;font-size:0.88rem}
.main-panel{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:16px}
.prompt-tip{background:#1c1c1f;border:1px solid #2a2a2e;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:0.82rem;color:#a1a1aa;line-height:1.7}
.prompt-tip strong{color:#06b6d4}
textarea{width:100%;background:#0a0a0a;border:1px solid var(--border);border-radius:12px;padding:14px;color:#e2e8f0;font-size:0.95rem;resize:vertical;min-height:100px;outline:none;transition:border 0.2s;font-family:inherit;line-height:1.6}
textarea:focus{border-color:var(--accent)}
textarea::placeholder{color:#52525b}
.examples{margin-top:12px}
.examples-label{font-size:0.78rem;color:#52525b;margin-bottom:8px}
.examples-grid{display:flex;flex-wrap:wrap;gap:6px}
.example-btn{padding:5px 12px;background:#0a0a0a;border:1px solid #2a2a2e;border-radius:20px;font-size:0.78rem;color:#71717a;cursor:pointer;transition:all 0.2s}
.example-btn:hover{border-color:var(--accent);color:var(--accent)}
.row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;align-items:center}
select,input[type="text"]{background:#0a0a0a;border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:#e2e8f0;font-size:0.88rem;outline:none;width:120px}
.btn{padding:11px 28px;border-radius:10px;border:none;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:inherit}
.btn-gen{background:linear-gradient(135deg,#a855f7,#06b6d4);color:#fff;flex:1}
.btn-gen:hover{opacity:0.88;transform:translateY(-1px)}
.btn-gen:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-sm{padding:8px 16px;background:#0a0a0a;color:#a1a1aa;border:1px solid var(--border);font-size:0.85rem}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.model-row{display:flex;gap:0;border:1px solid var(--border);border-radius:10px;overflow:hidden;width:fit-content}
.model-tab{padding:8px 18px;background:#0a0a0a;color:#71717a;font-size:0.82rem;cursor:pointer;border:none;transition:all 0.2s;white-space:nowrap}
.model-tab:hover{color:#e2e8f0}
.model-tab.active{background:linear-gradient(135deg,#a855f7,#06b6d4);color:#fff}
.aspect-row{display:flex;gap:0;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.aspect-btn{padding:8px 14px;background:#0a0a0a;color:#71717a;font-size:0.85rem;cursor:pointer;border:none;transition:all 0.2s}
.aspect-btn:hover{color:#e2e8f0}
.aspect-btn.active{border-color:var(--accent);background:rgba(168,85,247,0.15);color:var(--accent)}
.loading{margin-top:20px;display:none;flex-direction:column;align-items:center;gap:12px}
.loading.show{display:flex}
.spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:#71717a;font-size:0.88rem;text-align:center}
.result-area{margin-top:20px;display:none;flex-direction:column;align-items:center;gap:14px}
.result-area.show{display:flex}
.result-area img{max-width:100%;max-height:520px;border-radius:14px;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.result-info{margin-top:4px;font-size:0.78rem;color:#52525b;text-align:center;line-height:1.6}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.gallery{margin-top:28px}
.gallery h3{font-size:0.9rem;font-weight:600;color:#71717a;margin-bottom:12px}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px}
.gallery-item{aspect-ratio:1;border-radius:10px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:all 0.2s;position:relative}
.gallery-item:hover{border-color:var(--accent);transform:scale(1.03)}
.gallery-item img{width:100%;height:100%;object-fit:cover}
.gallery-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.65);display:none;align-items:center;justify-content:center;font-size:0.78rem;color:#fff}
.gallery-item:hover .gallery-overlay{display:flex}
.gallery-del{position:absolute;top:4px;right:4px;width:20px;height:20px;background:rgba(0,0,0,0.7);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:10px;cursor:pointer;color:#ff6b6b}
.gallery-item:hover .gallery-del{display:flex}
.footer-tip{margin-top:32px;text-align:center;color:#3f3f46;font-size:0.78rem}
.footer-tip a{color:var(--accent2);text-decoration:none}
.hd-banner{background:linear-gradient(135deg,rgba(168,85,247,0.15),rgba(6,182,212,0.15));border:1px solid rgba(168,85,247,0.3);border-radius:10px;padding:10px 16px;margin-bottom:12px;font-size:0.82rem;color:#a1a1aa;text-align:center;line-height:1.7}
.hd-banner strong{color:#a855f7}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>AI 图片生成器</h1>
    <p>免费 AI 生图 · 无需注册 · 直接使用</p>
  </div>

  <div class="main-panel">
    <div class="hd-banner">
      <strong>🎯 高清图片</strong>：直接对本助手说「<strong>生成图片：[描述]</strong>」可获得 MiniMax 高清输出（质量远超网页版）<br>
      本页面使用 <strong>Pollinations 免费引擎</strong>，适合快速预览，分辨率上限 768×768
    </div>

    <textarea id="promptInput" placeholder="输入图片描述（中英文均可）...&#10;例如：一只橘猫在阳光下打哈欠，毛发蓬松，高清摄影"></textarea>

    <div class="examples">
      <div class="examples-label">✨ 示例（点击加载）</div>
      <div class="examples-grid">
        <button class="example-btn" onclick="loadExample('a cozy coffee shop interior, rainy window, warm lighting, vintage furniture, photorealistic, 8K')">☕ 咖啡馆</button>
        <button class="example-btn" onclick="loadExample('a beautiful woman portrait, soft golden hour light, bokeh, fashion photography, 8K')">👩 人像摄影</button>
        <button class="example-btn" onclick="loadExample('cyberpunk city at night, neon signs, rain, futuristic, blade runner style')">🌃 赛博朋克</button>
        <button class="example-btn" onclick="loadExample('a fluffy orange cat sleeping on a couch, afternoon sunlight, cozy home, photorealistic')">🐱 可爱猫咪</button>
        <button class="example-btn" onclick="loadExample('fantasy landscape, floating islands, waterfalls, golden sunset, magical atmosphere, epic')">🏔️ 奇幻风景</button>
        <button class="example-btn" onclick="loadExample('anime girl with long blue hair, cherry blossoms, sakura petals, Studio Ghibli style')">🎌 动漫风格</button>
        <button class="example-btn" onclick="loadExample('steaming bowl of ramen with egg, top-down view, wood table, food photography, 8K')">🍜 美食摄影</button>
        <button class="example-btn" onclick="loadExample('a sword and magic staff crossed, dark fantasy setting, glowing runes, cinematic lighting')">⚔️ 奇幻武器</button>
      </div>
    </div>

    <div class="row">
      <div class="model-row">
        <button class="model-tab active" data-model="flux">Flux（推荐）</button>
        <button class="model-tab" data-model="sdxl">SDXL</button>
      </div>
      <div class="aspect-row">
        <button class="aspect-btn active" data-w="512" data-h="512">1:1</button>
        <button class="aspect-btn" data-w="768" data-h="512">16:9</button>
        <button class="aspect-btn" data-w="512" data-h="768">9:16</button>
        <button class="aspect-btn" data-w="768" data-h="768" style="color:#a855f7">HD</button>
      </div>
      <input type="text" id="seedInput" placeholder="Seed(可选)">
    </div>

    <div class="row" style="margin-top:14px">
      <button class="btn btn-gen" id="genBtn" onclick="generate()">✨ 生成图片</button>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="loading-text" id="loadingText">AI 正在创作，请稍候...</div>
    </div>

    <div class="result-area" id="resultArea">
      <img id="resultImg" src="" alt="生成结果">
      <div class="result-info" id="resultInfo"></div>
      <div class="btn-row">
        <button class="btn btn-gen" onclick="downloadImg()">⬇ 下载</button>
        <button class="btn btn-sm" onclick="regenerate()">🔄 重新生成</button>
        <button class="btn btn-sm" onclick="copyPrompt()">📋 复制 Prompt</button>
      </div>
    </div>
  </div>

  <div class="gallery" id="gallery">
    <h3>📁 生成历史（最近10张）</h3>
    <div class="gallery-grid" id="galleryGrid"></div>
  </div>

  <div class="footer-tip">
    使用 <a href="https://pollinations.ai" target="_blank">Pollinations.ai</a> API · 完全免费 · 无需登录<br>
    <span style="color:#52525b">如需更高清输出 → 直接对我说「生成图片：[描述]」</span>
  </div>
</div>

<script>
let currentModel = 'flux', currentW = 512, currentH = 512, currentSeed = null;
let currentFullPrompt = '';

const MODEL_TABS = document.querySelectorAll('.model-tab[data-model]');
MODEL_TABS.forEach(tab => {
  tab.addEventListener('click', () => {
    MODEL_TABS.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentModel = tab.dataset.model;
  });
});

const ASPECT_BTNS = document.querySelectorAll('.aspect-btn');
ASPECT_BTNS.forEach(btn => {
  btn.addEventListener('click', () => {
    ASPECT_BTNS.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentW = parseInt(btn.dataset.w);
    currentH = parseInt(btn.dataset.h);
  });
});

function loadExample(prompt) {
  document.getElementById('promptInput').value = prompt;
  document.getElementById('promptInput').focus();
}

function hasChinese(text) {
  return /[\u4e00-\u9fa5]/.test(text);
}

function improvePrompt(prompt) {
  // 常见中式英语修正
  const fixes = {
    'hairy details': 'detailed fur texture, soft fluffy fur',
    'high definition': 'high resolution, ultra detailed',
    'very real': 'photorealistic, hyperrealistic',
    'so beautiful': 'stunning, breathtaking, masterpiece',
    'very cute': 'adorable, endearing, charming',
    'very漂亮': 'beautiful, stunning',
    '毛发细节丰富': 'detailed fur texture, soft fluffy fur, hyperrealistic',
    '毛发蓬松': 'fluffy fur, soft plush coat, hyperrealistic',
    '高清摄影': 'professional photography, 8K, ultra detailed',
    '美丽': 'beautiful, stunning, breathtaking',
    '可爱': 'adorable, cute, charming',
  };
  let result = prompt;
  for (const [from, to] of Object.entries(fixes)) {
    result = result.replace(new RegExp(from, 'gi'), to);
  }
  return result;
}

async function translateToEnglish(text) {
  return new Promise((resolve, reject) => {
    const encoded = encodeURIComponent(text);
    const xhr = new XMLHttpRequest();
    xhr.open('GET', `https://api.mymemory.translated.net/get?q=${encoded}&langpair=zh-CN|en`, true);
    xhr.onload = () => {
      try {
        const json = JSON.parse(xhr.responseText);
        if (json.responseStatus === 200 && json.responseData?.translatedText) {
          resolve(improvePrompt(json.responseData.translatedText.trim()));
        } else {
          reject(new Error('translation failed'));
        }
      } catch(e) { reject(e); }
    };
    xhr.onerror = reject;
    xhr.send();
  });
}

async function generate(useExistingSeed) {
  const rawPrompt = document.getElementById('promptInput').value.trim();
  if (!rawPrompt) { alert('请输入图片描述'); return; }

  let prompt = rawPrompt;
  const loadingText = document.getElementById('loadingText');

  if (hasChinese(rawPrompt)) {
    loadingText.textContent = '🔤 检测到中文，正在翻译...';
    try {
      prompt = await translateToEnglish(rawPrompt);
      loadingText.textContent = `✨ 翻译: ${prompt}\n🎨 正在生成，请稍候...`;
    } catch(e) {
      loadingText.textContent = '⚠️ 翻译失败\n🎨 正在生成，请稍候...';
    }
  } else {
    loadingText.textContent = '✨ 正在生成，请稍候...';
  }

  const seedVal = useExistingSeed || document.getElementById('seedInput').value.trim() || Math.floor(Math.random() * 99999999);
  if (!useExistingSeed) currentSeed = seedVal;
  currentFullPrompt = prompt;

  const encoded = encodeURIComponent(prompt);
  const url = `https://image.pollinations.ai/prompt/${encoded}?width=${currentW}&height=${currentH}&model=${currentModel}&seed=${seedVal}&nologo=true`;

  showLoading(true);
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    document.getElementById('resultImg').src = url;
    document.getElementById('resultInfo').innerHTML = `Seed: ${seedVal} · ${currentW}×${currentH} · ${currentModel.toUpperCase()}<br><span style="color:#52525b">✨ 需要高清输出？→ 直接对我说「生成图片：${prompt.slice(0, 30)}...」</span>`;
    document.getElementById('resultArea').classList.add('show');
    document.getElementById('seedInput').value = seedVal;
    showLoading(false);
    saveToHistory(url, prompt, seedVal);
  };
  img.onerror = () => { showLoading(false); alert('生成失败，请重试（可能是网络问题或描述过于复杂）'); };
  img.src = url;
}

function showLoading(show) {
  document.getElementById('loading').classList.toggle('show', show);
  document.getElementById('genBtn').disabled = show;
}

function downloadImg() {
  const a = document.createElement('a');
  a.download = 'ai-image.png';
  a.href = document.getElementById('resultImg').src;
  a.click();
}

function regenerate() {
  document.getElementById('seedInput').value = '';
  generate();
}

function copyPrompt() {
  if (currentFullPrompt) {
    navigator.clipboard.writeText(currentFullPrompt).then(() => {
      alert('Prompt 已复制！可用于复现该图片');
    });
  }
}

function saveToHistory(url, prompt, seed) {
  try {
    let h = JSON.parse(localStorage.getItem('ai_image_history_v3') || '[]');
    h.unshift({ url, prompt, seed, time: Date.now() });
    h = h.slice(0, 10);
    localStorage.setItem('ai_image_history_v3', JSON.stringify(h));
    renderGallery();
  } catch(e) {}
}

function deleteFromHistory(idx, e) {
  e.stopPropagation();
  try {
    let h = JSON.parse(localStorage.getItem('ai_image_history_v3') || '[]');
    h.splice(idx, 1);
    localStorage.setItem('ai_image_history_v3', JSON.stringify(h));
    renderGallery();
  } catch(err) {}
}

function renderGallery() {
  try {
    const h = JSON.parse(localStorage.getItem('ai_image_history_v3') || '[]');
    const grid = document.getElementById('galleryGrid');
    grid.innerHTML = h.map((item, i) => `
      <div class="gallery-item" onclick="loadFromHistory(${i})">
        <img src="${item.url}" alt="history">
        <div class="gallery-overlay">🔄 重现</div>
        <div class="gallery-del" onclick="deleteFromHistory(${i}, event)">✕</div>
      </div>
    `).join('');
    document.getElementById('gallery').style.display = h.length ? 'block' : 'none';
  } catch(e) {}
}

function loadFromHistory(idx) {
  try {
    const h = JSON.parse(localStorage.getItem('ai_image_history_v3') || '[]');
    const item = h[idx];
    if (!item) return;
    document.getElementById('promptInput').value = item.prompt;
    document.getElementById('seedInput').value = item.seed;
    document.getElementById('resultImg').src = item.url;
    currentSeed = item.seed;
    currentFullPrompt = item.prompt;
    document.getElementById('resultInfo').innerHTML = `Seed: ${item.seed} · 重现历史<br><span style="color:#52525b">✨ 需要高清？→ 对我说「生成图片：${item.prompt.slice(0, 30)}...」</span>`;
    document.getElementById('resultArea').classList.add('show');
  } catch(e) {}
}

renderGallery();
</script>
</body>
</html>
