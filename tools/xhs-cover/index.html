<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小红书封面图生成器 - 免费在线工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans SC', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; background: linear-gradient(135deg, #ff6b9d, #c850c0, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 32px; }
    .back-link { display: inline-block; margin-bottom: 24px; color: #64748b; text-decoration: none; font-size: 0.9rem; }
    .back-link:hover { color: #ff6b9d; }

    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
    @media (max-width: 700px) { .layout { grid-template-columns: 1fr; } }

    .panel { background: #1e293b; border-radius: 16px; padding: 24px; }
    .panel-title { font-size: 0.9rem; font-weight: 600; color: #ff6b9d; margin-bottom: 20px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; }
    .field input[type="text"], .field select, .field textarea { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 8px 12px; color: #e2e8f0; font-size: 0.9rem; outline: none; }
    .field input[type="text"]:focus, .field textarea:focus { border-color: #ff6b9d; }
    .field textarea { resize: vertical; min-height: 60px; }

    .template-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .template-item { aspect-ratio: 3/4; border-radius: 10px; cursor: pointer; overflow: hidden; border: 3px solid transparent; transition: all 0.2s; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; color: #fff; text-align: center; padding: 4px; font-weight: 600; background: #0f172a; }
    .template-item:hover { border-color: #ff6b9d; transform: scale(1.03); }
    .template-item.selected { border-color: #ff6b9d; box-shadow: 0 0 12px rgba(255,107,157,0.3); }

    .btn { padding: 11px 28px; border-radius: 10px; border: none; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; width: 100%; }
    .btn-gen { background: linear-gradient(135deg, #ff6b9d, #c850c0); color: #fff; margin-bottom: 10px; }
    .btn-gen:hover { opacity: 0.85; }
    .btn-gen:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-dl { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    .btn-dl:hover { border-color: #00e5ff; color: #00e5ff; }

    .preview-area { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    #coverCanvas { width: 100%; max-width: 360px; border-radius: 12px; border: 2px solid #334155; }
    .canvas-placeholder { width: 100%; max-width: 360px; aspect-ratio: 3/4; border-radius: 12px; border: 2px dashed #334155; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #475569; font-size: 0.9rem; gap: 12px; }
    .loading { display: none; text-align: center; }
    .loading.show { display: block; }
    .spinner { width: 40px; height: 40px; border: 3px solid #334155; border-top-color: #ff6b9d; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 0.85rem; color: #64748b; text-align: center; }

    .aspect-btns { display: flex; gap: 8px; margin-bottom: 16px; }
    .asp-btn { flex: 1; padding: 7px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #94a3b8; font-size: 0.82rem; cursor: pointer; transition: all 0.2s; }
    .asp-btn.active { border-color: #ff6b9d; color: #ff6b9d; background: rgba(255,107,157,0.1); }

    .tips { margin-top: 32px; background: #1e293b; border-radius: 12px; padding: 20px; }
    .tips h3 { font-size: 0.95rem; color: #ff6b9d; margin-bottom: 10px; }
    .tips li { font-size: 0.85rem; color: #94a3b8; padding: 4px 0; list-style: none; }
    .tips li::before { content: '✓ '; color: #38a169; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/tool/" class="back-link">← 返回工具箱</a>
    <h1>小红书封面图生成器</h1>
    <p class="subtitle">输入主题描述，AI 自动生成精美小红书封面图，支持多种风格模板</p>

    <div class="layout">
      <div>
        <div class="panel">
          <div class="panel-title">🎨 封面设置</div>
          <div class="aspect-btns">
            <button class="asp-btn active" onclick="setAspect(3,4,this)">3:4 竖图</button>
            <button class="asp-btn" onclick="setAspect(4,3,this)">4:3 横图</button>
            <button class="asp-btn" onclick="setAspect(1,1,this)">1:1 方图</button>
          </div>
          <div class="field">
            <label>封面描述（英文效果更好）</label>
            <textarea id="prompt" placeholder="例如：a beautiful young asian woman smiling, selfie style, warm lighting, pastel colors, modern cafe background">a stylish chinese girl with glasses, reading a book in a cozy library, warm golden hour lighting, soft focus background, aesthetic flat lay style, pink and purple tones</textarea>
          </div>
          <div class="field">
            <label>封面标题（选填，将渲染到图上）</label>
            <input type="text" id="coverTitle" placeholder="例如：读书让我更自信" value="读书让我更自信">
          </div>
          <div class="field">
            <label>标题颜色</label>
            <input type="color" id="titleColor" value="#ffffff" style="width:60px;height:36px;border:none;border-radius:6px;cursor:pointer;">
          </div>

          <div class="panel-title" style="margin-top:20px">✨ 风格模板</div>
          <div class="template-grid">
            <div class="template-item selected" style="background:linear-gradient(135deg,#ff9a9e,#fecfef)" onclick="selectTpl(this,'')">清新<br>自然</div>
            <div class="template-item" style="background:linear-gradient(135deg,#667eea,#764ba2)" onclick="selectTpl(this,'')">时尚<br>炫酷</div>
            <div class="template-item" style="background:linear-gradient(135deg,#ffecd2,#fcb69f)" onclick="selectTpl(this,'')">温暖<br>生活</div>
            <div class="template-item" style="background:linear-gradient(135deg,#0c0c0c,#2d2d2d)" onclick="selectTpl(this,'')">高级<br>质感</div>
            <div class="template-item" style="background:linear-gradient(135deg,#a18cd1,#fbc2eb)" onclick="selectTpl(this,'')">梦幻<br>少女</div>
            <div class="template-item" style="background:linear-gradient(135deg,#37ecba,#72afd3)" onclick="selectTpl(this,'')">清凉<br>薄荷</div>
          </div>
        </div>
      </div>

      <div>
        <div class="panel preview-area">
          <div class="panel-title">📺 预览</div>
          <div id="placeholder" class="canvas-placeholder">
            <span>🎨</span>
            <span>点击下方「生成封面」开始</span>
          </div>
          <canvas id="coverCanvas" width="360" height="480" style="display:none"></canvas>
          <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="status" id="statusText">正在生成，请稍候...</div>
          </div>
          <button class="btn btn-gen" id="genBtn" onclick="generateCover()">✨ 生成封面</button>
          <button class="btn btn-dl" id="dlBtn" style="display:none" onclick="downloadCover()">⬇ 下载封面图</button>
        </div>
      </div>
    </div>

    <div class="tips">
      <h3>💡 使用说明</h3>
      <ul>
        <li>描述越详细，生成效果越好（建议用英文）</li>
        <li>可选填封面标题，文字将渲染在图片上方</li>
        <li>生成时间约 5-15 秒，请耐心等待</li>
        <li>下载后可上传到小红书使用</li>
      </ul>
    </div>
  </div>

  <script>
    let ar = [3, 4];
    let generatedImg = null;

    function setAspect(w, h, btn) {
      ar = [w, h];
      document.querySelectorAll('.asp-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const c = document.getElementById('coverCanvas');
      const size = Math.min(w, h) === 1 ? 400 : (ar[0] === 1 ? 400 : 360);
      c.width = ar[0] === 1 ? 400 : (ar[0] === 4 ? 480 : 360);
      c.height = ar[1] === 1 ? 400 : (ar[1] === 3 ? 360 : 480);
    }

    function selectTpl(el, style) {
      document.querySelectorAll('.template-item').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
    }

    async function generateCover() {
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) { alert('请输入封面描述'); return; }
      const c = document.getElementById('coverCanvas');
      const w = c.width, h = c.height;

      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('loading').classList.add('show');
      document.getElementById('genBtn').disabled = true;
      document.getElementById('dlBtn').style.display = 'none';

      try {
        const sizeStr = `${Math.round(w*2)}x${Math.round(h*2)}`;
        const encoded = encodeURIComponent(prompt);
        const imgUrl = `https://image.pollinations.ai/prompt/${encoded}?width=${Math.round(w*2)}&height=${Math.round(h*2)}&seed=${Math.floor(Math.random()*99999)}&nologo=true`;

        await new Promise((res, rej) => {
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = () => {
            const ctx = c.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);

            const title = document.getElementById('coverTitle').value.trim();
            if (title) {
              const tc = document.getElementById('titleColor').value;
              ctx.fillStyle = 'rgba(0,0,0,0.45)';
              ctx.fillRect(0, 0, w, h * 0.22);
              ctx.fillStyle = tc;
              ctx.font = `bold ${Math.round(w * 0.1)}px 'Noto Sans SC', sans-serif`;
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';
              ctx.shadowColor = 'rgba(0,0,0,0.8)';
              ctx.shadowBlur = 8;
              ctx.fillText(title, w / 2, h * 0.11);
            }

            generatedImg = c;
            res();
          };
          img.onerror = () => {
            ctx = c.getContext('2d');
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = '#64748b';
            ctx.font = '18px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('生成失败，请重试', w/2, h/2);
            rej(new Error('img load failed'));
          };
          img.src = imgUrl;
        });

        document.getElementById('statusText').textContent = '生成成功！';
        document.getElementById('dlBtn').style.display = 'block';
      } catch(e) {
        document.getElementById('statusText').textContent = '生成失败，请重试';
      } finally {
        document.getElementById('loading').classList.remove('show');
        document.getElementById('genBtn').disabled = false;
      }
    }

    function downloadCover() {
      if (!generatedImg) return;
      const link = document.createElement('a');
      link.download = '小红书封面.png';
      link.href = generatedImg.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
