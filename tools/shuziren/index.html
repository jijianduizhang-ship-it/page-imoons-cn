<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aira AI 全息交互界面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; }
        body {
            width: 100vw; height: 100vh; overflow: hidden;
            background: #0a0a12; position: relative;
        }
        .ai-avatar {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 340px; height: 620px;
            background: url('https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/5f529bfb53ba481cba3c3b7067d894b6.jpg') center/cover no-repeat;
            opacity: 0.92; filter: drop-shadow(0 0 35px rgba(100, 150, 255, 0.35));
            border-radius: 14px; z-index: 1; pointer-events: none;
            transition: transform 0.3s ease;
        }
        .ai-avatar.speaking {
            animation: avatarSpeak 0.6s ease-in-out infinite;
            filter: drop-shadow(0 0 50px rgba(100, 180, 255, 0.6));
        }
        @keyframes avatarSpeak {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.02); }
        }
        .ai-avatar::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 14px; border: 2px solid rgba(100, 180, 255, 0.25);
            box-shadow: 0 0 40px rgba(80, 140, 255, 0.2); z-index: 2;
        }
        .hud-card {
            position: absolute; background: rgba(20, 22, 35, 0.75);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-radius: 10px; padding: 14px 16px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(100, 160, 255, 0.18); z-index: 10;
            cursor: move; transition: all 0.28s ease; color: #e0e0ff;
        }
        .hud-card:hover { box-shadow: 0 8px 30px rgba(100, 160, 255, 0.25); border-color: rgba(120, 180, 255, 0.35); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 14px; font-weight: 500; color: #c0c8ff; }
        .status-badge { background: rgba(40, 45, 70, 0.8); color: #98a6e0; padding: 3px 8px; border-radius: 10px; font-size: 12px; font-weight: 500; }
        .status-badge.ready { background: rgba(36, 106, 66, 0.35); color: #6cef86; }
        .status-badge.loading { background: rgba(80, 60, 20, 0.4); color: #ffcc66; animation: pulse 1s infinite; }
        .status-badge.error { background: rgba(106, 36, 36, 0.4); color: #ff6b6b; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .chat-status-card { top: 40%; left: 3%; width: 260px; }
        .chat-list { max-height: 200px; overflow-y: auto; font-size: 13px; }
        .chat-list::-webkit-scrollbar { width: 3px; }
        .chat-list::-webkit-scrollbar-thumb { background: rgba(100, 150, 255, 0.3); border-radius: 2px; }
        .chat-item { margin-bottom: 10px; padding: 8px 10px; border-radius: 8px; }
        .chat-user { color: #88aaff; margin-bottom: 4px; }
        .chat-user::before { content: '👤 '; font-size: 11px; }
        .chat-ai { color: #c0d0ff; margin-top: 4px; line-height: 1.5; }
        .chat-ai::before { content: '🤖 '; font-size: 11px; }
        .history-card { top: 5%; right: 3%; width: 220px; }
        .history-placeholder { color: #6677aa; font-size: 13px; text-align: center; padding: 10px; }
        .aira-reply-card { bottom: 22%; right: 3%; width: 320px; min-height: 80px; }
        .reply-text { color: #d0e0ff; font-size: 14px; line-height: 1.6; min-height: 40px; }
        .work-mode-card { bottom: 5%; right: 3%; width: 220px; }
        .mode-info { font-size: 12px; color: #7788aa; }
        .mode-info span { color: #88aaff; }
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
            background: rgba(10, 10, 18, 0.9); backdrop-filter: blur(20px);
            border-top: 1px solid rgba(100, 160, 255, 0.1);
            padding: 12px 20px; display: flex; gap: 12px; align-items: center;
        }
        .input-box {
            flex: 1; background: rgba(30, 33, 55, 0.8); border: 1px solid rgba(100, 160, 255, 0.2);
            border-radius: 12px; padding: 12px 16px; color: #e0e0ff; font-size: 15px;
            outline: none; transition: border-color 0.3s;
        }
        .input-box:focus { border-color: rgba(100, 160, 255, 0.5); }
        .input-box::placeholder { color: #5566aa; }
        .mic-btn, .send-btn {
            width: 46px; height: 46px; border: none; border-radius: 50%; cursor: pointer;
            font-size: 18px; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; border: 1px solid rgba(100, 160, 255, 0.2);
        }
        .mic-btn { background: rgba(30, 33, 55, 0.8); }
        .mic-btn:hover { background: rgba(60, 80, 140, 0.6); transform: scale(1.05); }
        .mic-btn.recording { background: rgba(200, 50, 50, 0.5); animation: pulse 1s infinite; }
        .send-btn { background: linear-gradient(135deg, #4090ff, #6040ff); color: white; }
        .send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 20px rgba(80, 120, 255, 0.4); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .loading-dots { display: inline-block; }
        .loading-dots::after { content: '...'; animation: dots 1.5s steps(4, end) infinite; }
        @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 33, 55, 0.95); border: 1px solid rgba(100, 160, 255, 0.3);
            color: #e0e0ff; padding: 10px 24px; border-radius: 12px; font-size: 14px;
            z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="ai-avatar" id="avatar"></div>

    <div class="hud-card chat-status-card" id="chatStatusCard">
        <div class="card-header">
            <span>聊天状态</span>
            <span class="status-badge ready" id="statusBadge">已就绪</span>
        </div>
        <div class="chat-list" id="chatList">
            <div class="history-placeholder">对话记录将显示在这里</div>
        </div>
    </div>

    <div class="hud-card history-card">
        <div class="card-header"><span>历史摘要</span></div>
        <div class="history-placeholder">暂无摘要</div>
    </div>

    <div class="hud-card aira-reply-card">
        <div class="card-header">
            <div class="card-title">🤖 Aira 回复</div>
        </div>
        <div class="reply-text" id="replyText">您好！我是 Aira，您的全息数字人助手。有什么可以帮您的吗？</div>
    </div>

    <div class="hud-card work-mode-card">
        <div class="card-header">
            <span>工作模式</span>
            <span class="status-badge ready" id="modeBadge">云端</span>
        </div>
        <div class="mode-info">MiniMax AI · <span id="modelName">M2.5</span></div>
    </div>

    <div class="bottom-bar">
        <input type="text" class="input-box" id="inputBox" placeholder="和 Aira 对话..." onkeypress="if(event.key==='Enter')sendMessage()">
        <button class="mic-btn" id="micBtn" title="语音输入" onclick="toggleMic()">🎤</button>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>

    <div class="toast" id="toast"></div>
    <audio id="audioPlayer" style="display:none"></audio>

<script>
// ===== 配置 =====
const API_BASE = '/shuziren/api'; // 后端 API（nginx 代理）

// ===== 状态 =====
let chatHistory = [];
let isLoading = false;
let mediaRecorder = null;
let audioChunks = [];

// ===== 工具函数 =====
function showToast(msg, duration = 3000) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
}
function setStatus(text, type = 'ready') {
    const b = document.getElementById('statusBadge');
    b.textContent = text; b.className = 'status-badge ' + type;
}
function setReply(text) {
    document.getElementById('replyText').textContent = text || '...';
}

// ===== 拖拽 =====
(function initDrag() {
    const cards = document.querySelectorAll('.hud-card');
    let active = null, offX, offY;
    cards.forEach(c => {
        c.addEventListener('mousedown', e => {
            active = c; offX = e.clientX - c.offsetLeft; offY = e.clientY - c.offsetTop;
            c.style.zIndex = 100;
        });
    });
    document.addEventListener('mousemove', e => {
        if (!active) return;
        active.style.left = (e.clientX - offX) + 'px';
        active.style.top = (e.clientY - offY) + 'px';
        active.style.right = 'auto';
    });
    document.addEventListener('mouseup', () => { if (active) { active.style.zIndex = 10; active = null; } });
})();

// ===== 发送消息 =====
async function sendMessage() {
    const input = document.getElementById('inputBox');
    const text = input.value.trim();
    if (!text || isLoading) return;

    input.value = '';
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;
    setStatus('思考中...', 'loading');
    setReply('思考中<span class="loading-dots"></span>');

    // 添加用户消息到列表
    addChatItem('user', text);
    chatHistory.push({ role: 'user', content: text });

    try {
        const resp = await fetch(API_BASE + '/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: chatHistory })
        });
        const data = await resp.json();

        if (data.error) throw new Error(data.error);

        const reply = data.reply;
        chatHistory.push({ role: 'assistant', content: reply });

        setReply(reply);
        addChatItem('ai', reply);

        // 播放语音
        if (data.audioUrl) {
            await playAudio(data.audioUrl);
        } else if (data.audio) {
            // 直接播放 base64 音频
            playBase64Audio(data.audio);
        } else {
            // 没有音频，只显示文字
            document.getElementById('avatar').classList.remove('speaking');
        }

        setStatus('已就绪', 'ready');
    } catch (err) {
        console.error(err);
        setStatus('出错', 'error');
        setReply('抱歉，服务出现问题: ' + err.message);
        showToast('请求失败: ' + err.message);
    } finally {
        isLoading = false;
        document.getElementById('sendBtn').disabled = false;
    }
}

function addChatItem(role, text) {
    const list = document.getElementById('chatList');
    // 移除占位符
    const placeholder = list.querySelector('.history-placeholder');
    if (placeholder) placeholder.remove();

    const div = document.createElement('div');
    div.className = 'chat-item';
    div.innerHTML = role === 'user'
        ? `<div class="chat-user">${escapeHtml(text)}</div>`
        : `<div class="chat-ai">${escapeHtml(text)}</div>`;
    list.appendChild(div);
    list.scrollTop = list.scrollHeight;
}

function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== 音频播放 =====
async function playAudio(url) {
    const player = document.getElementById('audioPlayer');
    const avatar = document.getElementById('avatar');
    avatar.classList.add('speaking');
    player.src = url;
    await player.play().catch(e => console.warn('音频播放失败:', e));
    player.onended = () => avatar.classList.remove('speaking');
}

function playBase64Audio(base64Data) {
    const player = document.getElementById('audioPlayer');
    const avatar = document.getElementById('avatar');
    avatar.classList.add('speaking');
    const mimeType = base64Data.startsWith('/9j/') ? 'image/jpeg' : 'audio/mp3';
    const url = 'data:' + mimeType + ';base64,' + base64Data;
    player.src = url;
    player.play().then(() => {
        player.onended = () => avatar.classList.remove('speaking');
    }).catch(e => {
        console.warn('音频播放失败:', e);
        avatar.classList.remove('speaking');
    });
}

// ===== 麦克风 =====
let isRecording = false;

async function toggleMic() {
    const btn = document.getElementById('micBtn');
    if (isRecording) {
        stopRecording();
        return;
    }
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
            stream.getTracks().forEach(t => t.stop());
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            await processAudio(blob);
        };
        mediaRecorder.start();
        isRecording = true;
        btn.classList.add('recording');
        btn.textContent = '⏹';
        showToast('正在录音...');
    } catch (err) {
        showToast('无法访问麦克风: ' + err.message);
    }
}

function stopRecording() {
    if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        document.getElementById('micBtn').classList.remove('recording');
        document.getElementById('micBtn').textContent = '🎤';
    }
}

async function processAudio(blob) {
    showToast('正在识别...');
    const formData = new FormData();
    formData.append('audio', blob, 'recording.webm');

    try {
        const resp = await fetch(API_BASE + '/asr', { method: 'POST', body: formData });
        const data = await resp.json();
        if (data.error) throw new Error(data.error);

        document.getElementById('inputBox').value = data.text;
        showToast('识别完成: ' + data.text);
        // 自动发送
        sendMessage();
    } catch (err) {
        showToast('语音识别失败: ' + err.message);
    }
}
</script>
</body>
</html>
