<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI配色方案生成器 - 免费在线工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans SC', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; background: linear-gradient(135deg, #00e5ff, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 32px; }
    .back-link { display: inline-block; margin-bottom: 24px; color: #64748b; text-decoration: none; font-size: 0.9rem; }
    .back-link:hover { color: #00e5ff; }

    .input-panel { background: #1e293b; border-radius: 16px; padding: 28px; margin-bottom: 28px; }
    .input-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    @media (max-width: 640px) { .input-row { grid-template-columns: 1fr; } }
    .field { }
    .field label { display: block; font-size: 0.82rem; color: #94a3b8; margin-bottom: 6px; }
    .field input, .field select { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 9px 12px; color: #e2e8f0; font-size: 0.9rem; outline: none; transition: border 0.2s; }
    .field input:focus, .field select:focus { border-color: #00e5ff; }
    .btn { padding: 12px 32px; border-radius: 10px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; background: linear-gradient(135deg, #00e5ff, #8b5cf6); color: #0f1117; }
    .btn:hover { opacity: 0.85; transform: translateY(-1px); }

    .palettes { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .palette-card { background: #1e293b; border-radius: 16px; overflow: hidden; }
    .palette-colors { display: flex; height: 100px; }
    .color-swatch { flex: 1; cursor: pointer; transition: flex 0.3s; position: relative; }
    .color-swatch:hover { flex: 2; }
    .palette-info { padding: 16px; }
    .palette-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; }
    .palette-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .palette-tag { font-size: 0.72rem; padding: 2px 8px; border-radius: 20px; background: rgba(0,229,255,0.1); color: #00e5ff; }
    .color-list { display: flex; flex-direction: column; gap: 4px; }
    .color-row { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; font-family: monospace; }
    .color-dot { width: 20px; height: 20px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; flex-shrink: 0; }
    .color-hex { color: #94a3b8; cursor: pointer; }
    .color-hex:hover { color: #fff; }
    .copy-note { font-size: 0.75rem; color: #475569; margin-top: 6px; }

    .tips { margin-top: 32px; background: #1e293b; border-radius: 12px; padding: 20px; }
    .tips h3 { font-size: 0.95rem; color: #00e5ff; margin-bottom: 10px; }
    .tips li { font-size: 0.85rem; color: #94a3b8; padding: 4px 0; list-style: none; }
    .tips li::before { content: '✓ '; color: #38a169; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/tool/" class="back-link">← 返回工具箱</a>
    <h1>AI配色方案生成器</h1>
    <p class="subtitle">输入品牌名或行业，自动生成配套配色方案，支持一键复制色值</p>

    <div class="input-panel">
      <div class="input-row">
        <div class="field">
          <label>品牌/项目名称</label>
          <input type="text" id="brandName" placeholder="例如：月光博客" value="月光博客">
        </div>
        <div class="field">
          <label>所属行业</label>
          <select id="industry" onchange="generatePalettes()">
            <option value="tech">科技/互联网</option>
            <option value="fashion">时尚/美妆</option>
            <option value="food">餐饮/美食</option>
            <option value="health">健康/医疗</option>
            <option value="edu">教育/学习</option>
            <option value="finance">金融/投资</option>
            <option value="game">游戏/娱乐</option>
            <option value="travel">旅游/出行</option>
            <option value="art">艺术/设计</option>
            <option value="nature">自然/环保</option>
          </select>
        </div>
        <div class="field">
          <label>配色数量</label>
          <select id="count" onchange="generatePalettes()">
            <option value="4">4 套方案</option>
            <option value="6" selected>6 套方案</option>
            <option value="8">8 套方案</option>
          </select>
        </div>
      </div>
      <button class="btn" onclick="generatePalettes()">✨ 生成配色方案</button>
    </div>

    <div class="palettes" id="palettes"></div>

    <div class="tips">
      <h3>💡 使用说明</h3>
      <ul>
        <li>点击颜色方块可直接复制色值（HEX格式）</li>
        <li>点击 HEX 色值也可复制</li>
        <li>鼠标悬停在颜色条上可展开查看</li>
        <li>生成的配色适合 UI 设计、品牌视觉、海报制作等场景</li>
      </ul>
    </div>
  </div>

  <script>
    const PALETTE_TEMPLATES = [
      { name: '极简科技', colors: ['#0f172a','#1e293b','#00e5ff','#8b5cf6','#f8fafc'], tags: ['科技','简约'] },
      { name: '午夜赛博', colors: ['#050510','#0a0a1a','#00ffd5','#ff00aa','#ffffff'], tags: ['赛博','潮流'] },
      { name: '极光自然', colors: ['#0a2010','#1a4a2a','#00d4aa','#7cff6b','#e8f5e9'], tags: ['自然','清新'] },
      { name: '暖阳咖啡', colors: ['#2c1810','#4a2c1a','#d4a574','#8b5e3c','#faf3eb'], tags: ['温暖','复古'] },
      { name: '梦幻粉彩', colors: ['#1a0a20','#2d1a40','#ff9de2','#c77dff','#fff0fb'], tags: ['梦幻','少女'] },
      { name: '深邃海洋', colors: ['#0a192f','#112240','#64ffda','#0a66c2','#e6f1ff'], tags: ['海洋','商务'] },
      { name: '燃情烈焰', colors: ['#1a0500','#3d0a00','#ff4500','#ff8c00','#fff4e0'], tags: ['活力','激情'] },
      { name: '静谧和风', colors: ['#1a1510','#2d2420','#c8b8a2','#8b7355','#f5f0eb'], tags: ['日式','禅意'] },
      { name: '活力橙绿', colors: ['#0f2010','#1a3a1a','#00c853','#ff6d00','#e8f5e9'], tags: ['活力','健康'] },
      { name: '奢华金黑', colors: ['#0a0a0a','#1a1a1a','#d4af37','#b8860b','#faf8f0'], tags: ['奢华','高端'] },
      { name: '薄荷清凉', colors: ['#0d2010','#1a3a28','#00e676','#00bfa5','#e0f2f1'], tags: ['清凉','清新'] },
      { name: '浆果紫红', colors: ['#1a0510','#3d0f22','#c2185b','#8e24aa','#fce4ec'], tags: ['浆果','时尚'] },
    ];

    function generatePalettes() {
      const count = parseInt(document.getElementById('count').value);
      const shuffled = [...PALETTE_TEMPLATES].sort(() => Math.random() - 0.5);
      const selected = shuffled.slice(0, count);
      const container = document.getElementById('palettes');
      container.innerHTML = selected.map((p, idx) => `
        <div class="palette-card">
          <div class="palette-colors">
            ${p.colors.map(c => `<div class="color-swatch" style="background:${c}" title="${c}" onclick="copyColor('${c}')"></div>`).join('')}
          </div>
          <div class="palette-info">
            <div class="palette-name">${idx + 1}. ${p.name}</div>
            <div class="palette-tags">${p.tags.map(t => `<span class="palette-tag">${t}</span>`).join('')}</div>
            <div class="color-list">
              ${p.colors.map(c => `<div class="color-row"><div class="color-dot" style="background:${c}"></div><span class="color-hex" onclick="copyColor('${c}')">${c}</span><span style="color:#475569;font-size:0.75rem">${hexToRgb(c)}</span></div>`).join('')}
            </div>
            <div class="copy-note">点击颜色即可复制 HEX 值</div>
          </div>
        </div>
      `).join('');
    }

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return `rgb(${r}, ${g}, ${b})`;
    }

    function copyColor(hex) {
      navigator.clipboard.writeText(hex).then(() => {
        showToast('已复制: ' + hex);
      });
    }

    function showToast(msg) {
      const t = document.createElement('div');
      t.textContent = msg;
      t.style = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#00e5ff;color:#0f1117;padding:10px 24px;border-radius:8px;font-size:0.9rem;z-index:9999;font-weight:600;';
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2000);
    }

    generatePalettes();
  </script>
</body>
</html>
