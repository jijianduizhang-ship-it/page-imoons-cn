<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#4f8ef7;--bg:#f0f2f5;--card:#fff;--text:#1a1a2e;--muted:#8888a0;--sh:0 2px 12px rgba(0,0,0,0.06);--sh2:0 8px 32px rgba(79,142,247,0.18)}
body{font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px}
.top-nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.93);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,0.06);padding:0 16px;display:flex;align-items:center;overflow-x:auto;scrollbar-width:none;gap:2px}
.top-nav::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;display:inline-flex;align-items:center;gap:6px;padding:14px 14px 13px;font-size:0.88rem;font-weight:500;color:var(--muted);text-decoration:none;border-bottom:2.5px solid transparent;transition:color .2s,border-color .2s;white-space:nowrap;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none}
.tab:hover{color:var(--blue)}.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab svg{width:16px;height:16px;flex-shrink:0}
.c{max-width:1080px;margin:0 auto;padding:24px 20px 0}
.sb{position:relative;margin-bottom:24px}
.sb input{width:100%;padding:13px 20px 13px 48px;font-size:1rem;border:2px solid #e4e7f0;border-radius:50px;background:var(--card);color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
.sb input:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(79,142,247,0.1)}
.sb input::placeholder{color:#b4b8cc}
.sb svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:#b4b8cc;pointer-events:none}
.sh{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sh svg{width:20px;height:20px;flex-shrink:0}.sh h2{font-size:1rem;font-weight:700}
.g{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:32px}
.card{background:var(--card);border-radius:14px;padding:18px 16px 14px;text-decoration:none;color:inherit;border:1px solid rgba(0,0,0,0.06);box-shadow:var(--sh);transition:transform .2s,box-shadow .2s,border-color .2s;display:flex;flex-direction:column;gap:6px}
.card:hover{transform:translateY(-3px);box-shadow:var(--sh2);border-color:rgba(79,142,247,0.25)}
.ci{width:38px;height:38px;border-radius:10px;background:#f0f4ff;display:flex;align-items:center;justify-content:center;margin-bottom:2px}
.ci svg{width:20px;height:20px}
.cn{font-weight:600;font-size:0.9rem;color:#111}
.cd{font-size:0.75rem;color:var(--muted);line-height:1.55;flex:1}
.cu{font-size:0.7rem;color:#c8ccd8;margin-top:auto;padding-top:2px;word-break:break-all}
.card.ext{border-left:3px solid #ff7744}.card.ext .ci{background:#fff4ee}
.qg{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px}
.ql{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;background:#fff;border:1.5px solid #e4e7f0;border-radius:50px;text-decoration:none;color:var(--blue);font-size:0.85rem;font-weight:500;transition:all .2s}
.ql:hover{background:var(--blue);color:#fff;border-color:var(--blue);transform:translateY(-1px)}
.nr{display:none;text-align:center;padding:60px 20px;color:var(--muted);font-size:0.95rem}.nr.show{display:block}
.ft{text-align:center;color:#c8ccd8;font-size:0.78rem;padding:40px 20px 20px}
[data-tab]{display:none}[data-tab].show{display:block}
</style>
</head>

function showTab(id){
  document.querySelectorAll('[data-tab]').forEach(function(el){el.classList.remove('show');});
  document.querySelectorAll('.tab').forEach(function(el){el.classList.remove('active');});
  document.querySelector('[data-tab="'+id+'"]').classList.add('show');
  document.querySelector('[data-t="'+id+'"]').classList.add('active');
}

document.getElementById('searchInput').addEventListener('input',function(){
  var q=this.value.trim().toLowerCase();
  var cards=document.querySelectorAll('.card');
  var count=0;
  cards.forEach(function(card){
    var match=!q||card.querySelector('.cn').textContent.toLowerCase().indexOf(q)!==-1||card.querySelector('.cd').textContent.toLowerCase().indexOf(q)!==-1;
    card.style.display=match?'':'none';
    if(match) count++;
  });
  document.getElementById('noResult').classList.toggle('show',count===0&&q.length>0);
  document.querySelectorAll('.ql').forEach(function(l){l.style.display=!q||l.textContent.toLowerCase().indexOf(q)!==-1?'':'none';});
});
</script>
