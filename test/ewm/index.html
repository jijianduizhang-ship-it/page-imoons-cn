<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系官方客服</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* 基础样式 */
        :root {
            --primary-color: #ff4d4f;
            --secondary-color: #ffd666;
            --text-color: #fff;
            --gold-color: #ffdf00;
        }
        
        body {
            font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--primary-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        
        /* 渐变背景 */
        .gradient-bg {
            background: linear-gradient(135deg, #ff4d4f 0%, #ff7875 100%);
            position: relative;
            overflow: hidden;
        }
        
        /* 圆形装饰 */
        .circle-decoration {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            z-index: 0;
        }
        
        .circle-1 {
            width: 300px;
            height: 300px;
            right: -100px;
            top: 50px;
        }
        
        .circle-2 {
            width: 200px;
            height: 200px;
            left: -50px;
            bottom: 100px;
        }
        
        /* 标题样式 */
        .title {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--secondary-color);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            letter-spacing: 3px;
        }
        
        /* 按钮样式 */
        .btn-primary {
            background: linear-gradient(90deg, #ffbb33, #ffdd66);
            color: #7d3b00;
            border-radius: 30px;
            padding: 10px 30px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(255, 188, 0, 0.3);
            transition: all 0.3s ease;
            border: none;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(255, 188, 0, 0.4);
        }
        
        /* 二维码容器 */
        .qrcode-container {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            padding: 20px;
            position: relative;
            max-width: 320px;
            margin: 0 auto;
        }
        
        /* 用户列表 */
        .user-list {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 10px;
            margin-top: 20px;
        }
        
        .user-item {
            display: flex;
            align-items: center;
            padding: 8px 15px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            backdrop-filter: blur(5px);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
        }
        
        /* 金币动画 */
        .coin {
            position: absolute;
            width: 30px;
            height: 30px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23FFD700"><circle cx="12" cy="12" r="10" stroke="%23E6B800" stroke-width="1"/><text x="50%" y="55%" text-anchor="middle" fill="%23E6B800" font-family="Arial" font-weight="bold" font-size="12">¥</text></svg>');
            background-size: contain;
            animation: float 8s infinite ease-in-out;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(5deg); }
            50% { transform: translateY(-35px) rotate(-5deg); }
            75% { transform: translateY(-15px) rotate(3deg); }
        }
        
        /* 底部免责声明 */
        .disclaimer {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 20px;
            text-align: center;
            line-height: 1.5;
        }
        
        /* 响应式调整 */
        @media (min-width: 768px) {
            .container {
                max-width: 800px;
                margin: 0 auto;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            
            .content-wrapper {
                display: flex;
                width: 100%;
                gap: 30px;
                align-items: center;
            }
            
            .left-content, .right-content {
                flex: 1;
            }
            
            .qrcode-container {
                margin: 0;
            }
        }
        
        /* 动画效果 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .animate-fadeIn {
            opacity: 0;
            animation: fadeIn 0.5s ease forwards;
        }
        
        .animate-slideIn {
            opacity: 0;
            animation: slideIn 0.5s ease forwards;
        }
    </style>
</head>
<body>
    <!-- 页面顶部 -->

    
    <!-- 主内容 -->
    <div class="gradient-bg min-h-screen pb-10">
        <!-- 装饰圆圈 -->
        <div class="circle-decoration circle-1"></div>
        <div class="circle-decoration circle-2"></div>
        
        <!-- 浮动金币 -->
        <div class="coin" style="top: 20%; left: 10%; animation-delay: 0s;"></div>
        <div class="coin" style="top: 40%; right: 15%; animation-delay: 1s;"></div>
        <div class="coin" style="bottom: 30%; left: 20%; animation-delay: 2s;"></div>
        <div class="coin" style="bottom: 15%; right: 10%; animation-delay: 3s;"></div>
        
        <div class="container px-4 py-8 relative z-1">
            <!-- 标题 -->
        
            
            <!-- 内容区域 -->
            <div class="content-wrapper">
                <div class="left-content mb-6 md:mb-0">
                    <!-- 二维码区域 -->
                    <div class="qrcode-container">
                        <div class="text-center mb-4">
                            <div class="btn-primary inline-flex items-center justify-center mx-auto">
                                <span>长按二维码添加官方客服</span>
                            </div>
                        </div>
                        <div class="qrcode-image mx-auto w-64 h-64 relative">
                            <!-- 二维码图像 -->
                            <img src="WechatIMG114.jpg" alt="扫码添加官方客服" class="w-full h-full object-contain">
                        </div>
                    </div>
                </div>
                

            </div>
            
            <!-- 免责声明 -->
            <div class="disclaimer mt-8">
                <p>@寄快递客服</p>
            </div>
        </div>
    </div>
    
    <!-- JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 用户数据
   
            
            // 时间间隔（毫秒）
            const updateInterval = 3000;
            const userList = document.getElementById('user-list');
            
            // 初始显示五个用户
            let currentIndex = 5;
            
            // 动态更新用户列表
            setInterval(function() {
                // 创建新用户元素
                const newUser = users[currentIndex % users.length];
                const userItem = document.createElement('div');
                userItem.className = 'user-item animate-slideIn';
                userItem.innerHTML = `
                    <img src="${newUser.avatar}" alt="用户头像" class="user-avatar mr-3">
                    <span>${newUser.name} 刚刚领取了福利</span>
                `;
                
                // 添加到列表顶部
                userList.insertBefore(userItem, userList.firstChild);
                
                // 如果列表项超过5个，删除最后一个
                if (userList.children.length > 5) {
                    userList.removeChild(userList.lastChild);
                }
                
                currentIndex++;
            }, updateInterval);
        });
    </script>
</body>
</html>
