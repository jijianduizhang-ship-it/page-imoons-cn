<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片转PDF - 全能王工具箱</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap");

*{margin:0;padding:0;box-sizing:border-box}
:root{
    --bg:#0a0e1a;--surface:#111827;--card:#1a2235;--card-hover:#1e2940;
    --border:#2a3548;--border-hover:#4f6ef7;--text:#f1f5f9;--muted:#94a3b8;
    --accent:#4f6ef7;--accent2:#818cf8;--gold:#f59e0b;--green:#22c55e;
}
html{scroll-behavior:smooth}
body{font-family:'Space Grotesk','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(79,110,247,0.3);border-radius:2px}

header{padding:20px 0;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:var(--bg)}
.header-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:12px;font-size:20px;font-weight:700;text-decoration:none;color:var(--text);}
.logo-icon{width:42px;height:42px;background:linear-gradient(135deg,#4c1d95,#6d28d9,#7c3aed);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;border:1px solid rgba(139,92,246,0.3)}
.back-link{color:var(--muted);font-size:14px;text-decoration:none;transition:color 0.2s;}
.back-link:hover{color:var(--text);}

main{max-width:800px;margin:0 auto;padding:40px 20px 60px}

.panel-header{text-align:center;margin-bottom:32px}
.panel-header h1{font-size:clamp(22px,4vw,32px);font-weight:800;margin-bottom:8px;background:linear-gradient(135deg,#f9fafb 0%,#c7d2fe 40%,#a78bfa 70%,#f9fafb 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.panel-header p{color:var(--muted);font-size:14px;}

.upload-area{border:2px dashed var(--border);border-radius:16px;padding:48px 24px;text-align:center;cursor:pointer;transition:border-color 0.2s,background 0.2s;margin-bottom:24px}
.upload-area:hover{border-color:var(--accent);background:rgba(79,110,247,0.05)}
.upload-icon{font-size:40px;margin-bottom:12px}
.upload-text{font-size:15px;font-weight:600;margin-bottom:6px}
.upload-hint{font-size:12px;color:var(--muted)}
.upload-input{display:none}

.controls{grid-template-columns:repeat(auto-fit,minmax(220px,1fr));display:grid;gap:16px;margin-bottom:24px}
.control-group{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.control-group label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;display:block}
input[type="text"],input[type="number"],select,textarea{width:100%;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s;box-sizing:border-box}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
select option{background:var(--surface)}

.btn-group{display:flex;gap:12px;flex-wrap:wrap;margin:24px 0}
.btn{background:var(--accent);color:#fff;border:none;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:hover{background:var(--accent2);transform:translateY(-1px)}

.preview-container{display:grid;grid-template-columns:1fr;gap:16px;margin-top:20px}
.preview-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.preview-box h4{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;opacity:0;transition:all 0.3s;z-index:2000;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,0.4);white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.processing-overlay{position:fixed;inset:0;background:rgba(10,14,26,0.85);display:none;align-items:center;justify-content:center;z-index:1500;backdrop-filter:blur(4px)}
.processing-overlay.show{display:flex}
.processing-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 60px;text-align:center}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:600px){
    .controls{grid-template-columns:1fr !important}
}
</style>
</head>
<body>

<header>
    <div class="header-inner">
        <a href="/" class="logo">
            <div class="logo-icon">🛠️</div>
            <span>全能王工具箱</span>
        </a>
        <a href="/" class="back-link">← 返回工具箱</a>
    </div>
</header>

<main>
    <div class="panel-header">
        <h1>📄 图片转PDF</h1>
        <p>将多张图片合并转换为PDF文档</p>
    </div>

    <div class="upload-area" id="image2pdfUpload">
        <div class="upload-icon">📄</div>
        <div class="upload-text">点击或拖拽上传图片（可多选）</div>
        <div class="upload-hint">支持 JPG、PNG、WebP 格式，最多20张</div>
        <input type="file" class="upload-input" id="image2pdfInput" accept="image/*" multiple>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>PDF页面尺寸</label>
            <select id="pdfPageSize">
                <option value="a4">A4 (210 × 297mm)</option>
                <option value="letter">Letter (8.5 × 11in)</option>
                <option value="fit">适应图片尺寸</option>
            </select>
        </div>
        <div class="control-group">
            <label>图片排列</label>
            <select id="pdfLayout">
                <option value="1x1">每页1张</option>
                <option value="2x2">每页4张 (2×2)</option>
            </select>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn" id="image2pdfBtn">✨ 生成PDF</button>
    </div>

    <div class="preview-container" id="image2pdfPreview" style="display: none;">
        <div class="preview-box">
            <h4>已选图片 (<span id="image2pdfCount">0</span>张)</h4>
            <div id="image2pdfList" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-height:200px;overflow-y:auto;padding:10px;"></div>
        </div>
    </div>
</main>

<div class="toast" id="toast"></div>
<div class="processing-overlay" id="processing">
    <div class="processing-box">
        <div class="spinner"></div>
        <p>处理中，请稍候...</p>
    </div>
</div>

<script>
const { jsPDF } = window.jspdf;

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}
function showProcessing(show) {
    document.getElementById('processing').classList.toggle('show', show);
}

let image2pdfFiles = [];

document.getElementById('image2pdfInput').addEventListener('change', (e) => {
    const files = Array.from(e.target.files);
    if (files.length > 20) {
        showToast('最多只能上传20张图片');
        return;
    }
    image2pdfFiles = files;
    
    const previewList = document.getElementById('image2pdfList');
    previewList.innerHTML = '';
    files.forEach((file) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = document.createElement('img');
            img.src = e.target.result;
            img.style.width = '60px';
            img.style.height = '60px';
            img.style.objectFit = 'cover';
            img.style.borderRadius = '8px';
            img.style.border = '2px solid rgba(255,255,255,0.2)';
            previewList.appendChild(img);
        };
        reader.readAsDataURL(file);
    });
    
    document.getElementById('image2pdfCount').textContent = files.length;
    document.getElementById('image2pdfPreview').style.display = 'block';
});

document.getElementById('image2pdfUpload').addEventListener('click', () => {
    document.getElementById('image2pdfInput').click();
});

document.getElementById('image2pdfBtn').addEventListener('click', async () => {
    if (image2pdfFiles.length === 0) {
        showToast('请先上传图片');
        return;
    }

    const pageSize = document.getElementById('pdfPageSize').value;
    const layout = document.getElementById('pdfLayout').value;
    
    showProcessing(true);
    
    try {
        const a4Width = 210;
        const a4Height = 297;
        const letterWidth = 215.9;
        const letterHeight = 279.4;
        
        let pdfWidth, pdfHeight;
        if (pageSize === 'a4') {
            pdfWidth = a4Width;
            pdfHeight = a4Height;
        } else if (pageSize === 'letter') {
            pdfWidth = letterWidth;
            pdfHeight = letterHeight;
        } else {
            pdfWidth = a4Width;
            pdfHeight = a4Height;
        }
        
        const pdf = new jsPDF({
            orientation: pdfWidth > pdfHeight ? 'landscape' : 'portrait',
            unit: 'mm',
            format: [pdfWidth, pdfHeight]
        });
        
        pdf.deletePage(1);
        
        const loadImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        };
        
        let imagesPerPage = layout === '2x2' ? 4 : 1;
        let imgIndexOnPage = 0;
        
        for (let i = 0; i < image2pdfFiles.length; i++) {
            const img = await loadImage(image2pdfFiles[i]);
            
            if (pageSize === 'fit') {
                const imgRatio = img.width / img.height;
                pdfWidth = 210;
                pdfHeight = 210 / imgRatio;
                if (pdfHeight > 297) {
                    pdfHeight = 297;
                    pdfWidth = 297 * imgRatio;
                }
                if (i === 0 || imgIndexOnPage === 0) {
                    pdf.addPage([pdfWidth, pdfHeight]);
                }
            } else if (i === 0 || imgIndexOnPage === 0) {
                pdf.addPage([pdfWidth, pdfHeight]);
            }
            
            let x, y, w, h;
            
            if (layout === '2x2' && imagesPerPage === 4) {
                const margin = 10;
                const gap = 5;
                const cellWidth = (pdfWidth - margin * 2 - gap) / 2;
                const cellHeight = (pdfHeight - margin * 2 - gap) / 2;
                
                const col = imgIndexOnPage % 2;
                const row = Math.floor(imgIndexOnPage / 2);
                
                x = margin + col * (cellWidth + gap);
                y = margin + row * (cellHeight + gap);
                w = cellWidth;
                h = cellHeight;
                
                const imgRatio = w / h;
                const cellRatio = cellWidth / cellHeight;
                if (imgRatio > cellRatio) {
                    h = w / imgRatio;
                } else {
                    w = h * imgRatio;
                }
                x += (cellWidth - w) / 2;
                y += (cellHeight - h) / 2;
            } else {
                const margin = 10;
                const availWidth = pdfWidth - margin * 2;
                const availHeight = pdfHeight - margin * 2;
                
                const imgRatio = img.width / img.height;
                const pageRatio = availWidth / availHeight;
                
                if (imgRatio > pageRatio) {
                    w = availWidth;
                    h = w / imgRatio;
                } else {
                    h = availHeight;
                    w = h * imgRatio;
                }
                x = (pdfWidth - w) / 2;
                y = (pdfHeight - h) / 2;
            }
            
            pdf.addImage(img, 'JPEG', x, y, w, h);
            imgIndexOnPage++;
            
            if (imgIndexOnPage >= imagesPerPage) {
                imgIndexOnPage = 0;
            }
        }
        
        pdf.save('images.pdf');
        showToast('PDF生成成功！');
    } catch (error) {
        console.error(error);
        showToast('生成失败: ' + error.message);
    } finally {
        showProcessing(false);
    }
});
</script>
</body>
</html>
