<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公众号排版工作室 V6</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Noto Sans SC','PingFang SC',sans-serif;background:#0b0b0b;color:#e0e0e0;height:100vh;overflow:hidden;display:flex}
#left{width:440px;min-width:400px;display:flex;flex-direction:column;border-right:1px solid #1e1e1e;background:#111;overflow:hidden}
#right{flex:1;display:flex;flex-direction:column;align-items:center;overflow:hidden;background:#080808}
.hdr{padding:14px 18px;border-bottom:1px solid #1e1e1e;flex-shrink:0;display:flex;align-items:center;gap:10px}
.logo{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:900}
.sec{padding:10px 18px;border-bottom:1px solid #1e1e1e;flex-shrink:0}
.sec-label{font-size:9px;color:#555;margin-bottom:6px;font-weight:700;letter-spacing:2px;display:flex;justify-content:space-between;align-items:center}
.sec-label .hint{color:#333;font-weight:400;letter-spacing:0;font-size:9px}

/* 风格按钮 */
.grp{margin-bottom:6px}
.grp:last-child{margin-bottom:0}
.grp-title{font-size:9px;color:#3a3a3a;margin-bottom:4px;font-weight:700;letter-spacing:1.5px}
.grp-row{display:flex;flex-wrap:wrap;gap:4px}
.sbtn{background:transparent;border:1px solid #1e1e1e;border-radius:14px;padding:4px 10px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
.sbtn.act{background:#222}
.sbtn .dot{width:6px;height:6px;border-radius:50%}
.sbtn span{font-size:11px;color:#666;font-weight:400}
.sbtn.act span{color:#fff;font-weight:600}

/* 品牌色 */
.color-row{display:flex;align-items:center;gap:6px}
.color-row label{font-size:9px;color:#555;font-weight:700;letter-spacing:1px;flex-shrink:0}
.color-row input[type=color]{width:24px;height:24px;border:none;border-radius:4px;cursor:pointer;background:transparent;padding:0}
.color-row input[type=text]{flex:1;background:#1a1a1a;border:1px solid #222;border-radius:5px;padding:4px 8px;color:#888;font-size:11px;outline:none;font-family:monospace}
.color-row button{background:#1e1e1e;border:none;border-radius:4px;padding:3px 7px;color:#666;font-size:9px;cursor:pointer}

/* 图片台 */
#img-bay{max-height:200px;overflow-y:auto}
#img-bay::-webkit-scrollbar{width:4px}
#img-bay::-webkit-scrollbar-thumb{background:#222;border-radius:2px}
.img-add{width:100%;background:#161616;border:1px dashed #2a2a2a;border-radius:6px;padding:10px;cursor:pointer;color:#555;font-size:11px;text-align:center;transition:all .15s}
.img-add:hover{border-color:#3a3a3a;color:#777;background:#1a1a1a}
.img-add.dragover{border-color:#4a90e2;color:#4a90e2;background:#1a2230}
.img-list{margin-top:6px;display:flex;flex-direction:column;gap:4px}
.img-item{display:flex;align-items:center;gap:8px;background:#161616;border:1px solid #1e1e1e;border-radius:6px;padding:6px 8px;font-size:11px}
.img-thumb{width:32px;height:32px;border-radius:4px;object-fit:cover;flex-shrink:0;background:#222}
.img-meta{flex:1;min-width:0}
.img-num{color:#888;font-weight:700;font-family:monospace}
.img-name{color:#666;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.img-role{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:3px;color:#888;font-size:10px;padding:2px 5px;outline:none;cursor:pointer}
.img-cap{width:100%;background:#0e0e0e;border:1px solid #1e1e1e;border-radius:3px;color:#777;font-size:10px;padding:3px 6px;outline:none;margin-top:3px;font-family:inherit}
.img-del{background:transparent;border:none;color:#444;cursor:pointer;font-size:14px;padding:2px 4px}
.img-del:hover{color:#888}

/* 插入按钮 */
.insert-row{display:flex;flex-wrap:wrap;gap:4px}
.ins-btn{background:#161616;border:1px solid #1e1e1e;border-radius:12px;padding:4px 10px;cursor:pointer;color:#777;font-size:10px;transition:all .15s}
.ins-btn:hover{background:#1e1e1e;color:#aaa;border-color:#2a2a2a}
.ins-btn.ins-img{color:#5a8fa0;border-color:#1f2a30}
.ins-btn.ins-img:hover{color:#7eb6c8;border-color:#2a3a45;background:#16222a}
.img-insert{background:#1a3a45;border:1px solid #2a4a5a;border-radius:4px;color:#7eb6c8;font-size:10px;padding:3px 8px;cursor:pointer;margin-right:4px;font-weight:600}
.img-insert:hover{background:#234a5a;color:#9bc8da}

/* 编辑器 */
#editor-wrap{flex:1;display:flex;flex-direction:column;padding:8px 18px;min-height:0}
.ed-label{font-size:9px;color:#555;margin-bottom:5px;font-weight:700;letter-spacing:1px;display:flex;justify-content:space-between}
#editor{flex:1;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:8px;padding:12px;color:#aaa;font-size:12px;line-height:1.75;resize:none;outline:none;font-family:'SF Mono','Fira Code',monospace;min-height:120px}

/* 复制 */
#copy-wrap{padding:8px 18px 12px;border-top:1px solid #1e1e1e;flex-shrink:0}
#copy-btn{width:100%;padding:11px;border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:all .3s;letter-spacing:1px}
#copy-hint{font-size:9px;color:#333;text-align:center;margin:5px 0 0;line-height:1.5}

/* 右侧预览 */
.prev-bar{width:100%;padding:8px 18px;border-bottom:1px solid #131313;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.prev-bar .pl{font-size:10px;color:#2a2a2a;letter-spacing:1px}
.style-tag{font-size:10px;color:#444;background:#131313;padding:3px 10px;border-radius:8px}
.style-tag .tdot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:5px;vertical-align:middle}
#phone-wrap{flex:1;display:flex;justify-content:center;align-items:flex-start;padding:16px;overflow:auto;width:100%}
#phone{width:375px;background:#1a1a1a;border-radius:40px;padding:12px;box-shadow:0 4px 80px rgba(0,0,0,.6);flex-shrink:0}
.phone-top{border-radius:30px 30px 0 0;overflow:hidden}
.notch{display:flex;justify-content:center;padding:8px 0 6px}
.notch-bar{width:72px;height:22px;background:#1a1a1a;border-radius:11px}
.wx-bar{padding:6px 0;text-align:center;font-size:13px;font-weight:600;letter-spacing:.5px}
#article{padding:16px 18px 36px;min-height:480px;overflow-y:auto;max-height:calc(100vh - 200px)}
#article::-webkit-scrollbar{width:4px}
#article::-webkit-scrollbar-thumb{background:#0003;border-radius:2px}
.phone-bot{border-radius:0 0 30px 30px;padding:12px 0;text-align:center}
.home-bar{width:100px;height:4px;opacity:.1;border-radius:2px;margin:0 auto}

/* 折叠区域 */
.collapsible{cursor:pointer;user-select:none;display:inline-flex;align-items:center;gap:4px}
.collapsible::after{content:"▾";color:#444;font-size:8px;transition:transform .2s;display:inline-block}
.collapsible.collapsed::after{transform:rotate(-90deg)}
</style>
</head>
<body>

<div id="left">
  <div class="hdr">
    <div class="logo" id="logo-icon">文</div>
    <div>
      <div style="font-size:13px;font-weight:700;color:#fff">公众号排版工作室</div>
      <div style="font-size:9px;color:#444;margin-top:1px">V6 · 12 风格 · 图片系统</div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-label">风格预设</div>
    <div id="style-panel"></div>
  </div>

  <div class="sec">
    <div class="color-row">
      <label>品牌色</label>
      <input type="color" id="bc-picker" value="#7ea8b8">
      <input type="text" id="bc-text" placeholder="#HEX">
      <button id="bc-reset" style="display:none">×</button>
    </div>
  </div>

  <div class="sec">
    <div class="sec-label">
      <span class="collapsible" id="img-toggle">图片台</span>
      <span class="hint" id="img-count">0 张</span>
    </div>
    <div class="col-content">
      <div class="img-add" id="img-add">＋ 拖入图片 / 点击上传<br><span style="font-size:9px;color:#444">上传后点「插入」按钮放入文章</span></div>
      <input type="file" id="img-input" accept="image/*" multiple style="display:none">
      <div class="img-list" id="img-list"></div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-label">
      <span>快捷插入</span>
      <span class="hint">点击插入到光标位置</span>
    </div>
    <div class="insert-row">
      <button class="ins-btn" data-ins="lead">导语</button>
      <button class="ins-btn" data-ins="tip">提示</button>
      <button class="ins-btn" data-ins="note">注意</button>
      <button class="ins-btn" data-ins="warn">警告</button>
      <button class="ins-btn" data-ins="pull">金句</button>
      <button class="ins-btn" data-ins="table">表格</button>
      <button class="ins-btn" data-ins="sign">落款</button>
      <button class="ins-btn ins-img" data-ins="fig">＋配图</button>
      <button class="ins-btn ins-img" data-ins="cover">＋封面图</button>
      <button class="ins-btn ins-img" data-ins="quote">＋引用图</button>
      <button class="ins-btn ins-img" data-ins="duo">＋双图</button>
      <button class="ins-btn ins-img" data-ins="trio">＋三图</button>
    </div>
  </div>

  <div id="editor-wrap">
    <div class="ed-label"><span>文章内容（Markdown）</span><span id="char-count" style="color:#333"></span></div>
    <textarea id="editor" placeholder="粘贴文章内容..."></textarea>
  </div>

  <div id="copy-wrap">
    <button id="copy-btn">复制全文 → 粘贴到公众号</button>
    <p id="copy-hint">粘贴到公众号后，点击图片占位卡槽即可插入实际图片</p>
  </div>
</div>

<div id="right">
  <div class="prev-bar"><span class="pl">实时预览</span><span class="style-tag" id="style-tag"></span></div>
  <div id="phone-wrap">
    <div id="phone">
      <div class="phone-top" id="phone-top">
        <div class="notch"><div class="notch-bar"></div></div>
        <div class="wx-bar" id="wx-bar">公众号文章</div>
      </div>
      <div id="article"></div>
      <div class="phone-bot" id="phone-bot"><div class="home-bar" id="home-bar"></div></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// 风格定义 — V6 增加 imgBorder（图片框） / imgCap（图注） / codeStyle
// ═══════════════════════════════════════════════
const S={
  elegant:{name:"素雅书卷",dot:"#7ea8b8",bg:"#f8f7f5",text:"#3d3d3d",hd:"#2b2b2b",ac:"#7ea8b8",al:"#edf3f6",mu:"#999",dv:"#ddd8d0",code:"light"},
  business:{name:"商务克制",dot:"#2b5ea7",bg:"#fff",text:"#333",hd:"#1a1a1a",ac:"#2b5ea7",al:"#eef3fa",mu:"#888",dv:"#e5e5e5",code:"light"},
  warm:{name:"文艺温暖",dot:"#c47d5a",bg:"#faf6f1",text:"#4a4a4a",hd:"#3a3a3a",ac:"#c47d5a",al:"#f5ece4",mu:"#a09080",dv:"#e5ddd3",code:"light"},
  sunrise:{name:"清晨日光",dot:"#e8913a",bg:"#fffcf7",text:"#42392e",hd:"#2c2318",ac:"#e8913a",al:"#fff4e6",mu:"#a08c70",dv:"#efe5d6",code:"light"},
  tech:{name:"科技极简",dot:"#0ea5e9",bg:"#fff",text:"#1a1a1a",hd:"#000",ac:"#0ea5e9",al:"#f0f9ff",mu:"#6b7280",dv:"#e5e7eb",code:"dark"},
  chinese:{name:"国风雅韵",dot:"#b5453a",bg:"#f9f5ef",text:"#4a3f35",hd:"#2d2419",ac:"#b5453a",al:"#f0e9df",mu:"#9a8e7f",dv:"#d9cfc2",sub:"#8b7355",code:"light"},
  magazine:{name:"潮流杂志",dot:"#ff4757",bg:"#fff",text:"#1a1a1a",hd:"#000",ac:"#ff4757",al:"#fff5f5",mu:"#777",dv:"#eee",sub:"#ffc312",code:"light"},
  forest:{name:"知性墨绿",dot:"#2d6a4f",bg:"#f7faf8",text:"#3a3a3a",hd:"#1b3a2a",ac:"#2d6a4f",al:"#eaf5ee",mu:"#7a9485",dv:"#d4e4da",code:"light"},
  aurora:{name:"星辰旷野",dot:"#0891b2",bg:"#f0f4f8",text:"#334155",hd:"#0f172a",ac:"#0891b2",al:"#e0f7fa",mu:"#64748b",dv:"#cbd5e1",sub:"#7c3aed",code:"dark"},
  morandi:{name:"莫兰迪灰",dot:"#b8a9a0",bg:"#f4f0ec",text:"#6b6560",hd:"#4a4540",ac:"#b8a9a0",al:"#ece6e0",mu:"#a09890",dv:"#ddd5cc",code:"light"},
  mint:{name:"薄荷清新",dot:"#10b981",bg:"#f7fdfb",text:"#334155",hd:"#0f172a",ac:"#10b981",al:"#ecfdf5",mu:"#64748b",dv:"#d1fae5",code:"light"},
  neon:{name:"电子玫瑰",dot:"#ec4899",bg:"#fdf2f8",text:"#3b2040",hd:"#1e1030",ac:"#ec4899",al:"#fce7f3",mu:"#9a7bab",dv:"#f3d0e8",sub:"#8b5cf6",code:"dark"},
};

const groups=[
  {label:"经典",keys:["elegant","business","warm","sunrise"]},
  {label:"专业",keys:["tech","chinese","magazine","forest"]},
  {label:"创意",keys:["aurora","morandi","mint","neon"]}
];

// 全局状态
let curKey="elegant", brandColor="";
let images=[]; // {id, name, dataUrl, role, caption}
let imgIdCounter=1;

// ═══════════════════════════════════════════════
// Markdown 解析器 — 扩展支持新元素
// ═══════════════════════════════════════════════
function parseMD(text){
  const lines=text.split("\n");
  const tokens=[];
  let i=0;
  while(i<lines.length){
    const l=lines[i];
    if(!l.trim()){i++;continue;}

    // 代码块
    if(l.trim().startsWith("```")){
      const lang=l.trim().slice(3).trim();
      const c=[];i++;
      while(i<lines.length&&!lines[i].trim().startsWith("```")){c.push(lines[i]);i++;}
      tokens.push({t:"code",c:c.join("\n"),lang});i++;continue;
    }

    // 提示框 !!! type 标题
    const callMatch=l.match(/^!!!\s+(tip|note|warn|info)(?:\s+(.+))?/);
    if(callMatch){
      const type=callMatch[1];
      const title=callMatch[2]||"";
      const c=[];i++;
      while(i<lines.length&&!lines[i].trim().startsWith("!!!")){c.push(lines[i]);i++;}
      tokens.push({t:"callout",ctype:type,title,c:c.join("\n").trim()});
      if(i<lines.length)i++;
      continue;
    }

    // 落款 --- 开头但内容里有 "作者" 或 "公众号"
    if(/^---\s*作者[:：]/.test(l)||/^---\s*signature/i.test(l)){
      tokens.push({t:"sign",c:l.replace(/^---\s*/,"").trim()});
      i++;continue;
    }

    // 普通分隔线
    if(/^(-{3,}|\*{3,}|_{3,})$/.test(l.trim())){tokens.push({t:"hr"});i++;continue;}

    // 导语 >>> 内容
    if(l.trim().startsWith(">>> ")){
      const q=[];
      while(i<lines.length&&lines[i].trim().startsWith(">>> ")){
        q.push(lines[i].trim().slice(4));i++;
      }
      tokens.push({t:"lead",c:q.join(" ")});continue;
    }

    // 标题
    const h=l.match(/^(#{1,3})\s+(.+)/);
    if(h){tokens.push({t:"h"+h[1].length,c:h[2].trim()});i++;continue;}

    // 引用：支持 > / >  / 多段（空行写为单独一行 >），与 CommonMark 块引用一致
    if(/^\s*>/.test(l)){
      const q=[];
      while(i<lines.length){
        const m=lines[i].match(/^\s*>\s?(.*)$/);
        if(!m)break;
        q.push(m[1]);
        i++;
      }
      tokens.push({t:"bq",c:q.join("\n")});continue;
    }

    // 金句 ‖ 内容 ‖
    const pullMatch=l.match(/^‖\s*(.+?)\s*‖$/);
    if(pullMatch){tokens.push({t:"pull",c:pullMatch[1]});i++;continue;}

    // 表格
    if(l.includes("|")&&i+1<lines.length&&/^[\s|:-]+$/.test(lines[i+1])){
      const headers=l.split("|").map(s=>s.trim()).filter(Boolean);
      i+=2;
      const rows=[];
      while(i<lines.length&&lines[i].includes("|")){
        rows.push(lines[i].split("|").map(s=>s.trim()).filter(Boolean));
        i++;
      }
      tokens.push({t:"table",headers,rows});continue;
    }

    // 图片占位 ![[1]] 或 ![[1|cover]] 或 ![[1,2|duo]]
    const imgPlace=l.trim().match(/^!\[\[([0-9,\s]+)(?:\|(\w+))?\]\]$/);
    if(imgPlace){
      const ids=imgPlace[1].split(",").map(s=>parseInt(s.trim())).filter(n=>!isNaN(n));
      let role=imgPlace[2]||"fig";
      if(!imgPlace[2]){
        if(ids.length===2)role="duo";
        else if(ids.length===3)role="trio";
      }
      tokens.push({t:"img",ids,role});i++;continue;
    }

    // 标准 Markdown 图片 ![alt](url "caption")
    const stdImg=l.trim().match(/^!\[([^\]]*)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)$/);
    if(stdImg){
      tokens.push({t:"imgUrl",alt:stdImg[1],url:stdImg[2],cap:stdImg[3]||""});i++;continue;
    }

    // 列表
    if(/^\s*[-*+]\s+/.test(l)){
      const a=[];
      while(i<lines.length&&/^\s*[-*+]\s+/.test(lines[i])){a.push(lines[i].replace(/^\s*[-*+]\s+/,""));i++;}
      tokens.push({t:"ul",items:a});continue;
    }
    if(/^\s*\d+\.\s+/.test(l)){
      const a=[];
      while(i<lines.length&&/^\s*\d+\.\s+/.test(lines[i])){a.push(lines[i].replace(/^\s*\d+\.\s+/,""));i++;}
      tokens.push({t:"ol",items:a});continue;
    }

    // 段落
    const p=[];
    while(i<lines.length&&lines[i].trim()!==""&&
          !lines[i].trim().startsWith("#")&&
          !/^\s*>/.test(lines[i])&&
          !lines[i].trim().startsWith(">>>")&&
          !lines[i].trim().startsWith("```")&&
          !lines[i].trim().startsWith("!!!")&&
          !lines[i].trim().startsWith("---")&&
          !/^(-{3,}|\*{3,}|_{3,})$/.test(lines[i].trim())&&
          !/^\s*[-*+]\s+/.test(lines[i])&&
          !/^\s*\d+\.\s+/.test(lines[i])&&
          !/^!\[/.test(lines[i].trim())&&
          !/^‖/.test(lines[i].trim())){
      p.push(lines[i]);i++;
    }
    if(p.length)tokens.push({t:"p",c:p.join(" ")});
  }
  return tokens;
}

// 由 render() 在每次渲染前设置：preview=可点链接，export=复制到公众号时改为「文案 url」纯文本
let inlLinkMode = 'preview';
function inl(t,s){
  let h=t;
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong style="color:'+s.ac+';font-weight:700">$1</strong>');
  h=h.replace(/(?<!\*)\*([^*]+?)\*(?!\*)/g,'<em style="font-style:italic">$1</em>');
  h=h.replace(/==(.+?)==/g,function(_,m){return '<span style="border-bottom:2px solid '+s.ac+';font-weight:600;color:'+s.hd+';padding-bottom:1px">'+m+'</span>';});
  h=h.replace(/`(.+?)`/g,'<code style="background:'+s.al+';color:'+s.ac+';padding:2px 6px;border-radius:3px;font-size:13px">$1</code>');
  if(inlLinkMode==='export'){
    h=h.replace(/\[(.+?)\]\((.+?)\)/g,function(_,text,url){return text+' '+url;});
  }else{
    h=h.replace(/\[(.+?)\]\((.+?)\)/g,'<a style="color:'+s.ac+';text-decoration:none;border-bottom:1px solid '+s.ac+'">$1</a>');
  }
  return h;
}

// ═══════════════════════════════════════════════
// H2 标题 (沿用 V5)
// ═══════════════════════════════════════════════
const H2={

// ═══════════════════════════════════════════════
// SVG 占位图生成 - 关键技术：用 SVG data URI 作为 <img> 的 src
// 公众号编辑器会识别 <img> 并允许用户点击替换，替换时外层样式保留
// ═══════════════════════════════════════════════
function svgPlaceholder(label, num, accent, bgColor, isQuote, isCover){
  const w = 800;
  const h = isCover ? 450 : 600;
  const ac = accent.replace("#","");
  const bg = (bgColor || "#f5f5f5").replace("#","");

  // 关键：SVG 内部统一用单引号，避免与外层 HTML 的 src="..." 冲突
  let labelMark = "";
  if(isQuote){
    labelMark = "<rect x='40' y='40' width='130' height='44' rx='4' fill='#"+ac+"'/><text x='105' y='71' font-family='-apple-system,sans-serif' font-size='22' font-weight='700' fill='white' text-anchor='middle'>QUOTE</text>";
  }else if(isCover){
    labelMark = "<rect x='40' y='40' width='150' height='44' rx='4' fill='#"+ac+"'/><text x='115' y='71' font-family='-apple-system,sans-serif' font-size='22' font-weight='700' fill='white' text-anchor='middle'>COVER</text>";
  }

  const cx = w/2;
  const cy = h/2;

  // 相机图标 + 文字提示
  const svg = "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 "+w+" "+h+"'>"
    + "<rect width='"+w+"' height='"+h+"' fill='#"+bg+"'/>"
    + labelMark
    // 相机图标外框
    + "<rect x='"+(cx-70)+"' y='"+(cy-90)+"' width='140' height='100' rx='8' fill='none' stroke='#"+ac+"' stroke-width='4'/>"
    // 相机镜头
    + "<circle cx='"+cx+"' cy='"+(cy-40)+"' r='28' fill='none' stroke='#"+ac+"' stroke-width='4'/>"
    + "<circle cx='"+cx+"' cy='"+(cy-40)+"' r='12' fill='#"+ac+"' fill-opacity='0.3'/>"
    // 相机顶部小凸起
    + "<rect x='"+(cx-20)+"' y='"+(cy-100)+"' width='40' height='14' rx='3' fill='#"+ac+"'/>"
    // 主标题：角色 + 编号
    + "<text x='"+cx+"' y='"+(cy+60)+"' font-family='-apple-system,PingFang SC,sans-serif' font-size='38' font-weight='700' fill='#"+ac+"' text-anchor='middle'>"+label+" "+num+"</text>"
    // 副标题：操作提示
    + "<text x='"+cx+"' y='"+(cy+105)+"' font-family='-apple-system,PingFang SC,sans-serif' font-size='22' fill='#"+ac+"' fill-opacity='0.65' text-anchor='middle'>点击此处替换为图片</text>"
    + "</svg>";

  // URL 编码：把 # 等特殊字符全部转义，保证 data URI 在 HTML src 里安全
  return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
}

// ═══════════════════════════════════════════════
// 图片渲染 - 三种角色的差异化样式
// ═══════════════════════════════════════════════

// 配图（默认） - 带风格化边框 + 图注
function renderFig(s, k, img, num, mode){
  const cfg = IMG[k] || IMG.elegant;
  const frame = cfg.frame(s);
  let imgSrc;
  if(mode==="preview" && img && img.dataUrl){
    imgSrc = img.dataUrl;
  }else{
    imgSrc = svgPlaceholder("配图", num, s.ac, s.al, false, false);
  }
  let html = '<section style="margin:24px 0">';
  html += '<section style="' + frame + '"><img src="' + imgSrc + '" style="display:block;width:100%;height:auto" /></section>';
  const cap = img && img.caption ? img.caption : "";
  if(cap){
    let prefix = cfg.capPrefix || "";
    let suffix = cfg.capSuffix || "";
    if(cfg.capNum){
      const n = cfg.capNumFmt!==undefined ? cfg.capNumFmt + (num<10?'0'+num:num) + '  ' : (num<10?'0'+num:num) + '.  ';
      prefix = n + prefix;
    }
    html += '<p style="' + cfg.cap(s) + '">' + prefix + cap + suffix + '</p>';
  }
  html += '</section>';
  return html;
}

// 封面图 - 全宽大图，无边框，更醒目
function renderCoverImg(s, k, img, num, mode){
  let imgSrc;
  if(mode==="preview" && img && img.dataUrl){
    imgSrc = img.dataUrl;
  }else{
    imgSrc = svgPlaceholder("封面图", num, s.ac, s.al, false, true);
  }
  // 封面图样式：全宽，无边框（或极简边框），上下留白更多
  let html = '<section style="margin:8px 0 32px">';
  html += '<img src="' + imgSrc + '" style="display:block;width:100%;height:auto" />';
  if(img && img.caption){
    html += '<p style="text-align:center;color:' + s.mu + ';font-size:12px;margin:10px 0 0;letter-spacing:1px;font-weight:600">' + img.caption + '</p>';
  }
  html += '</section>';
  return html;
}

// 引用图 - 在配图基础上加引用标识：左侧粗色条 + "引用"标签
function renderQuoteImg(s, k, img, num, mode){
  const cfg = IMG[k] || IMG.elegant;
  let imgSrc;
  if(mode==="preview" && img && img.dataUrl){
    imgSrc = img.dataUrl;
  }else{

// 代码块内 HTML：公众号编辑器常忽略 <p> 内真实换行且丢弃 white-space:pre-wrap，粘贴后挤成一行。
// 做法：& < > 转义后按行拆分，行首空格/Tab 改为 &nbsp;，行与行用 <br/> 显式断行（与 editor 类工具一致）。
function renderCodeForWeixin(raw){
  var esc=raw.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  return esc.split("\n").map(function(line){
    var i=0;
    while(i<line.length&&(line[i]===" "||line[i]==="\t"))i++;
    var lead=line.slice(0,i).replace(/ /g,"&nbsp;").replace(/\t/g,"&nbsp;&nbsp;&nbsp;&nbsp;");
    return lead+line.slice(i);
  }).join("<br/>");
}

// 代码块（按风格 light/dark 区分）
function renderCode(c,s,k){
  var inner=renderCodeForWeixin(c);
  var pBase='font-size:13px;line-height:1.7;font-family:Menlo,Monaco,Consolas,monospace;margin:0;word-wrap:break-word;word-break:break-word';
  if(s.code==="dark"){
    return '<section style="background:#1e293b;padding:16px 20px;margin:0 0 24px;border-radius:6px"><p style="color:#e2e8f0;'+pBase+'">'+inner+'</p></section>';
  }
  return '<section style="background:'+s.al+';border-left:3px solid '+s.ac+';padding:14px 18px;margin:0 0 24px;border-radius:0 4px 4px 0"><p style="color:'+s.text+';'+pBase+'">'+inner+'</p></section>';
}

// 主渲染函数
// mode: "preview" 中控台预览（显示真实图）  "export" 复制时（占位卡槽）
// ═══════════════════════════════════════════════
function render(tokens,s,k,mode){
  inlLinkMode = mode === 'export' ? 'export' : 'preview';
  const bp='color:'+s.text+';font-size:15px;line-height:2;letter-spacing:1px;margin:0 0 20px';
  return tokens.map(function(tok){
    switch(tok.t){
      case "h1":return '<h1 style="font-size:22px;font-weight:700;color:'+s.hd+';text-align:center;margin:0 0 6px;line-height:1.6;letter-spacing:2px">'+inl(tok.c,s)+'</h1>';
      case "h2":return (H2[k]||H2.elegant)(tok.c,s);
      case "h3":return k==="chinese"
        ?'<section style="margin:28px 0 14px"><h3 style="font-size:15px;font-weight:700;color:'+s.ac+';margin:0;line-height:1.6;letter-spacing:1px">◇ '+inl(tok.c,s)+'</h3></section>'
        :'<section style="margin:28px 0 14px"><h3 style="font-size:15px;font-weight:700;color:'+s.ac+';margin:0;line-height:1.6;letter-spacing:1px">'+inl(tok.c,s)+'</h3></section>';
      case "p":return '<p style="'+bp+'">'+inl(tok.c,s)+'</p>';
      case "bq":return (BQ[k]||BQ.elegant)(tok.c,s);
      case "ul":return renderUL(tok.items,s,k);
      case "ol":return renderOL(tok.items,s);
      case "code":return renderCode(tok.c,s,k);
      case "hr":return (HR[k]||HR.elegant)(s);
      case "lead":return renderLead(tok.c,s,k);
      case "callout":return renderCallout(tok.ctype,tok.title,tok.c,s,k);
      case "pull":return renderPull(tok.c,s,k);
      case "table":return renderTable(tok.headers,tok.rows,s,k);
      case "sign":return renderSign(tok.c,s,k);

      case "img":{
        const ids=tok.ids;
        const role=tok.role;
        if(role==="cover"){
          const img=images.find(im=>im.id===ids[0]);
          return renderCoverImg(s,k,img,ids[0],mode);
        }
        if(role==="quote"){
          const img=images.find(im=>im.id===ids[0]);
          return renderQuoteImg(s,k,img,ids[0],mode);
        }
        if(role==="duo"||role==="trio"){
          const imgs=ids.map(id=>images.find(im=>im.id===id));
          const cap=imgs[0]&&imgs[0].caption?imgs[0].caption:"";
          const count=role==="duo"?2:3;
          return renderMultiImg(s,k,imgs,ids[0],cap,count,mode);
        }
        // 默认 fig
        const img=images.find(im=>im.id===ids[0]);
        return renderFig(s,k,img,ids[0],mode);
      }

      case "imgUrl":{
        // 标准 markdown 图片，模拟成 fig 角色
        const fakeImg={dataUrl:tok.url,caption:tok.cap};
        return renderFig(s,k,fakeImg,"?",mode);
      }

      default:return "";
    }
  }).join("\n");
}

function applyBrand(st,color){
  if(!color||!/^#[0-9a-fA-F]{6}$/.test(color))return st;
  const r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
  const l='rgb('+Math.round(r*.08+255*.92)+','+Math.round(g*.08+255*.92)+','+Math.round(b*.08+255*.92)+')';
  return Object.assign({},st,{dot:color,ac:color,al:l});
}

// 插入元素到光标位置
// 智能选择图片 ID — 优先用图片台里的，没有则用占位数字
function smartImgIds(count){
  if(images.length>=count){
    return images.slice(0,count).map(im=>im.id).join(",");
  }
  // 不足时，已有的 + 占位
  const ids=images.map(im=>im.id);
  let next=imgIdCounter;
  while(ids.length<count){ids.push(next++);}
  return ids.join(",");
}

// 图片快捷插入 — 动态生成
function getImgSnippet(role){
  if(role==="fig"){const id=images[0]?images[0].id:1;return "![["+id+"]]\n\n";}
  if(role==="cover"){const id=images[0]?images[0].id:1;return "![["+id+"|cover]]\n\n";}
  if(role==="quote"){const id=images[0]?images[0].id:1;return "![["+id+"|quote]]\n\n";}
  if(role==="duo"){return "![["+smartImgIds(2)+"]]\n\n";}
  if(role==="trio"){return "![["+smartImgIds(3)+"]]\n\n";}
  return "";
}

function insertAtCursor(text){
  const ed=document.getElementById("editor");
  const start=ed.selectionStart;
  const end=ed.selectionEnd;
  ed.value=ed.value.slice(0,start)+text+ed.value.slice(end);
  ed.selectionStart=ed.selectionEnd=start+text.length;
  ed.focus();
  refresh();
}

function showCopyFail(msg){

// 降级方案：用临时元素 + execCommand
function fallbackCopy(htmlContent){
  const tmp=document.createElement("div");
  tmp.contentEditable="true";
  tmp.innerHTML=htmlContent;
  // 必须可见才能被选中，但放到屏幕外
  tmp.style.position="fixed";
  tmp.style.left="-9999px";
  tmp.style.top="0";
  tmp.style.opacity="0";
  document.body.appendChild(tmp);

  try{
    const range=document.createRange();
    range.selectNodeContents(tmp);
    const sel=window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    const ok=document.execCommand("copy");
    sel.removeAllRanges();
    document.body.removeChild(tmp);
    return ok;
  }catch(err){
    document.body.removeChild(tmp);
    console.error("Fallback copy failed:",err);
    return false;
  }
}

document.getElementById("copy-btn").addEventListener("click",function(){
  const s=getCur();
  const tokens=parseMD(document.getElementById("editor").value);
  const renderedHtml=render(tokens,s,curKey,"export");
  const full='<section style="max-width:578px;margin:0 auto;padding:24px 16px">'+renderedHtml+'</section>';

  // 优先使用现代 Clipboard API（带 .catch 处理 Promise 错误）
  if(navigator.clipboard && navigator.clipboard.write && window.ClipboardItem){
    try{
      const blob=new Blob([full],{type:"text/html"});
      const item=new ClipboardItem({"text/html":blob});
      navigator.clipboard.write([item]).then(function(){
        showCopySuccess();
      }).catch(function(err){
        console.warn("Clipboard API failed, trying fallback:",err);
        // Promise 失败 → 走降级
        if(fallbackCopy(full)){
          showCopySuccess();
        }else{
          showCopyFail("复制失败，请检查浏览器权限");
        }
      });
    }catch(err){
      console.warn("ClipboardItem creation failed, trying fallback:",err);
      if(fallbackCopy(full)){
        showCopySuccess();
      }else{
        showCopyFail("复制失败");
      }
    }
  }else{
    // 浏览器不支持 Clipboard API → 直接降级
    if(fallbackCopy(full)){
      showCopySuccess();
    }else{
      showCopyFail("浏览器不支持复制，请手动选择");
    }
  }
});
