nav{position:fixed;top:0;left:0;width:100%;z-index:1000;background:rgba(10,10,15,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}

.hub-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,215,0,0.1);color:var(--gold);border:1px solid rgba(255,215,0,0.3);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700}
.hub-badge .dot{width:7px;height:7px;background:var(--gold);border-radius:50%;animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.search-wrap{position:relative;margin-bottom:16px}
.search-wrap input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:15px;background:var(--bg-card);color:var(--text);outline:none;transition:.2s;font-family:var(--font-main)}
.search-wrap input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(255,215,0,0.1)}
.search-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:18px;opacity:.5}
.cat-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.cat-tab{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:13px;font-weight:700;cursor:pointer;background:var(--bg-card);color:var(--text-dim);transition:.15s}
.cat-tab:hover{border-color:var(--gold);color:var(--gold)}
.cat-tab.active{background:var(--gold);color:#000;border-color:var(--gold)}
.cat-count{font-size:11px;opacity:.7;margin-left:4px}
.articles-list{display:flex;flex-direction:column;gap:14px}
.article-card{background:var(--bg-card);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px 22px;transition:.2s;text-decoration:none;display:block}
.article-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 6px 24px rgba(255,215,0,0.08)}
.card-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.card-tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;background:rgba(255,215,0,0.15);color:var(--gold)}
.card-date{font-size:12px;color:var(--text-dim)}
.card-readtime{font-size:12px;color:var(--text-dim)}
.card-title{font-size:17px;font-weight:800;line-height:1.45;margin-bottom:8px}

.card-footer{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.card-tools{display:flex;gap:5px;flex-wrap:wrap}

.sidebar{display:flex;flex-direction:column;gap:20px}
.widget{background:var(--bg-card);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px}

let currentCat = 'all';
function renderArticles(filter = '') {
  const list = document.getElementById('articlesList');
  let filtered = articles;
  if (currentCat !== 'all') filtered = filtered.filter(a => a.category === currentCat);
  if (filter) filtered = filtered.filter(a => a.title.includes(filter) || a.summary.includes(filter) || a.tags.some(t => t.includes(filter)));
  if (filtered.length === 0) { list.innerHTML = '<div class="empty-state">没有找到相关文章</div>'; return; }
  list.innerHTML = filtered.map(a => '<a href="#" class="article-card" onclick="viewArticle(' + a.id + ');return false"><div class="card-meta"><span class="card-tag">' + getCatName(a.category) + '</span><span class="card-date">' + a.date + '</span><span class="card-readtime">' + a.readtime + '</span></div><div class="card-title">' + a.title + '</div><div class="card-summary">' + a.summary + '</div><div class="card-footer"><div class="card-tools">' + a.tags.map(t => '<span class="card-tool">' + t + '</span>').join('') + '</div>' + (a.money ? '<span class="card-money">' + a.money + '</span>' : '') + '</div></a>').join('');
}
function getCatName(cat) { return {tools:'🛠️ AI工具',project:'📋 项目实录',mindset:'🧠 思维认知'}[cat] || cat; }
function filterByCat(cat) { currentCat = cat; document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active')); document.querySelector('.cat-tab:nth-child(' + (cat === 'all' ? 1 : cat === 'tools' ? 2 : cat === 'project' ? 3 : 4) + ')').classList.add('active'); renderArticles(document.getElementById('searchInput').value); }
function filterArticles() { renderArticles(document.getElementById('searchInput').value); }
function renderSidebar() {
  const hot = [...articles].sort((a, b) => b.hot - a.hot).slice(0, 5);
  document.getElementById('hotList').innerHTML = hot.map((a, i) => '<div class="hot-item" onclick="viewArticle(' + a.id + ')"><span class="hot-rank">' + (i + 1) + '</span>' + a.title + '</div>').join('');
  const allTags = [...new Set(articles.flatMap(a => a.tags))];
  document.getElementById('tagCloud').innerHTML = allTags.map(t => '<span class="tag-pill" onclick="filterArticles('' + t + '')">' + t + '</span>').join('');
  const cats = ['tools','project','mindset'];
  const catNames = {tools:'AI工具',project:'项目实录',mindset:'思维认知'};
  const total = articles.length;
  document.getElementById('catStat').innerHTML = cats.map(c => { const count = articles.filter(a => a.category === c).length; const pct = (count/total*100).toFixed(0); return '<div class="cat-stat-row"><span>' + catNames[c] + '</span><div class="cat-stat-bar-wrap"><div class="cat-stat-bar" style="width:' + pct + '%"></div></div><span class="cat-stat-num">' + count + '</span></div>'; }).join('');
  document.getElementById('count-all').textContent = articles.length;
  cats.forEach(c => document.getElementById('count-' + c).textContent = articles.filter(a => a.category === c).length);
  document.getElementById('articleCount').textContent = articles.length;
}
